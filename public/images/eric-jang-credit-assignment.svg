<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Naive winner imitation versus MCTS relabeling</title>
  <desc id="desc">A comparison showing winner-only imitation drowning a single useful move in neutral labels, while MCTS provides an improved label for each move.</desc>
  <rect width="980" height="540" fill="#fbfaf6"/>
  <rect x="38" y="34" width="904" height="468" rx="22" fill="#ffffff" stroke="#ded8ca" stroke-width="2"/>
  <text x="70" y="88" font-family="Georgia, serif" font-size="30" fill="#1d1a17">The credit assignment problem</text>
  <text x="70" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#66615a">Winning tells you a trajectory worked; search can tell you how each move could have been better.</text>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="78" y="172" width="390" height="250" rx="18" fill="#f6ecec" stroke="#d4b2b2" stroke-width="2"/>
    <text x="112" y="214" font-size="23" font-weight="700" fill="#24211e">Winner imitation</text>
    <text x="112" y="250" font-size="16" fill="#775b5b">51 wins, 49 losses</text>
    <text x="112" y="278" font-size="16" fill="#775b5b">Maybe one decisive move mattered.</text>
    <g transform="translate(112 318)">
      <rect width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="22" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="44" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="66" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="88" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="110" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="132" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="154" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="176" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="198" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="220" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="242" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="264" width="16" height="42" rx="3" fill="#bf8b8b"/>
      <rect x="286" width="16" height="42" rx="3" fill="#2f7d5a"/>
    </g>
    <text x="112" y="394" font-size="15" fill="#775b5b">Good signal gets diluted by many neutral labels.</text>

    <rect x="512" y="172" width="390" height="250" rx="18" fill="#f2f6ef" stroke="#b9c9ae" stroke-width="2"/>
    <text x="546" y="214" font-size="23" font-weight="700" fill="#24211e">MCTS relabeling</text>
    <text x="546" y="250" font-size="16" fill="#5f6c58">For each move: search locally.</text>
    <text x="546" y="278" font-size="16" fill="#5f6c58">Train on the improved visit-count target.</text>
    <g transform="translate(546 322)" fill="none" stroke="#2f7d5a" stroke-width="3" marker-end="url(#arrow)">
      <path d="M0 0 C38 -26 76 -26 116 0"/>
      <path d="M142 0 C180 -26 218 -26 258 0"/>
      <path d="M284 0 C322 -26 360 -26 398 0"/>
    </g>
    <g transform="translate(546 335)">
      <circle cx="0" cy="0" r="8" fill="#2f7d5a"/>
      <circle cx="116" cy="0" r="8" fill="#2f7d5a"/>
      <circle cx="142" cy="0" r="8" fill="#2f7d5a"/>
      <circle cx="258" cy="0" r="8" fill="#2f7d5a"/>
      <circle cx="284" cy="0" r="8" fill="#2f7d5a"/>
      <circle cx="398" cy="0" r="8" fill="#2f7d5a"/>
    </g>
    <text x="546" y="394" font-size="15" fill="#5f6c58">Each action can get a better local label.</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f7d5a"/>
    </marker>
  </defs>
</svg>
